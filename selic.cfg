# Archivo de configuración para SELIC v1.2.0
# Usa este archivo para definir valores predeterminados amigables.
# Comentarios: cualquier línea que empiece con # o ; se ignora.

[defaults]
# Datos sociales — descomenta si deseas tenerlos como default en modo CLI 
#Los datos que no coloques se autocompleten con estos.
# Estos son solo ejemplos; si se dejan activos, contaminan la wordlist en modo CLI.
# name = Juan
# color = azul
# birth_year = 08/04/1990, 2010
# year = 14/02/2015
# family_name = María
# family_years = 1975, 2002
# team = River Plate
# birth_place = Buenos Aires
# living_city = Córdoba
# dni = 12345678
# pet = Luna
# singer = Shakira
# other = fútbol, moto

# Ruta al diccionario opcional. Si se deja vacío, se genera desde los datos sociales.
dict_file =

# Archivo de salida y directorio base para los archivos.
output_file = passlist.txt
base_dir =

# Plantillas de patrones y modo de reemplazo para '#'.
# Si se dejan activas, se generan contraseñas con estos patrones aunque no los pases por CLI.
# patterns = 7###C, Nombre##!, ###@2026
# hash_mode = all

# Rango de longitud y cantidad máxima.
min_length = 4
max_length = 32
count =

# Variaciones generales.
lower = true
upper = true
digits = true
specials = false
leet = true

# Sufijos/Prefijos personalizados. 
# Se pegarán al inicio y al final de cada palabra base.
# Ejemplo: digit_suffixes = SH, PRO, !, 2025
digit_suffixes =

# Descomponer números en fragmentos (años/documentos).
decompose_numbers = false

# RAM máxima en GB para deduplicación en memoria (default: 3).
# Más RAM = más candidatos deduplicados sin tocar disco. Si se excede,
# se auto-deduplica al final sin perder datos.
max_ram = 3

# Freno de seguridad: bloquea la generación si supera 1 billón de contraseñas.
# Solo actívalo si tienes Terabytes de espacio en disco y mucho tiempo.
allow_extreme_generation = false

# Límite de seguridad para activar el bloqueo (por defecto 5,000 millones)
extreme_generation_limit = 5000000000

# Límite de expansión para patrones con # (marcador de posición).
# Evita que un patrón como ########## genere billones de combinaciones por error.
# El valor por defecto de 100 millones es seguro para la mayoría de los casos.
max_template_expansion = 100000000
[leet]
# Mapeo de letras a caracteres leet. Cambia estos valores para personalizar.
# NOTA: Para evitar explosiones combinatorias y bloqueos de memoria RAM, 
# el algoritmo actual solo permite 1 único símbolo de reemplazo por letra.
# Si deseas probar con otros símbolos (ej. a=@), debes cambiarlo aquí y volver a ejecutar.
# Ejemplo: a=4 significa que 'a' se reemplaza por '4'.
a=4
A=4
e=3
E=3
o=0
O=0
i=1
I=1
s=5
S=5
l=1
L=1
t=7
T=7
g=9
G=9
